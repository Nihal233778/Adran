     <!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>🍪 Fortune Cookie | Telegram Mini App</title>
    <!-- Telegram WebApp SDK (required for full Telegram features) -->
    <script src="https://telegram.org/js/telegram-web-app.js?56"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
            background: var(--tg-theme-bg-color, #f9f3e8);
            color: var(--tg-theme-text-color, #2c1810);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            transition: background 0.2s;
        }

        .card {
            max-width: 480px;
            width: 100%;
            background: var(--tg-theme-secondary-bg-color, rgba(255,248,235,0.95));
            border-radius: 48px;
            padding: 32px 24px;
            box-shadow: 0 20px 35px -12px rgba(0,0,0,0.2);
            text-align: center;
            backdrop-filter: blur(2px);
            border: 1px solid var(--tg-theme-hint-color, #e6d5b8);
        }

        .emoji-header {
            font-size: 4rem;
            margin-bottom: 12px;
        }

        h1 {
            font-size: 1.8rem;
            font-weight: 700;
            background: linear-gradient(135deg, #ffb347, #ff6b4a);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            margin-bottom: 8px;
        }

        .user-info {
            background: var(--tg-theme-bg-color, #fff0e0);
            border-radius: 60px;
            padding: 12px 18px;
            margin: 20px 0;
            font-size: 0.9rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 8px;
        }

        .fortune-box {
            background: #fffaec;
            border-radius: 32px;
            padding: 28px 16px;
            margin: 20px 0;
            min-height: 150px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            transition: all 0.2s;
            border: 2px dashed #ffb347;
        }

        .fortune-text {
            font-size: 1.35rem;
            font-weight: 500;
            line-height: 1.4;
            color: #5a3e2b;
        }

        .fortune-lucky-number {
            margin-top: 12px;
            font-size: 1rem;
            color: #ff6b4a;
            font-weight: 600;
        }

        button {
            background: var(--tg-theme-button-color, #ffb347);
            color: var(--tg-theme-button-text-color, #2c1810);
            border: none;
            font-size: 1.2rem;
            font-weight: 600;
            padding: 14px 28px;
            border-radius: 60px;
            cursor: pointer;
            width: 100%;
            transition: transform 0.1s, opacity 0.2s;
            margin-top: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        button:active {
            transform: scale(0.97);
        }

        .secondary-btn {
            background: transparent;
            border: 2px solid var(--tg-theme-button-color, #ffb347);
            color: var(--tg-theme-button-color, #ffb347);
            margin-top: 8px;
        }

        .counter {
            margin-top: 20px;
            font-size: 0.8rem;
            opacity: 0.7;
            display: flex;
            justify-content: center;
            gap: 20px;
        }

        footer {
            margin-top: 24px;
            font-size: 0.7rem;
            opacity: 0.5;
        }
    </style>
</head>
<body>
<div class="card">
    <div class="emoji-header">🥠</div>
    <h1>Fortune Cookie</h1>
    <p style="opacity: 0.7; margin-bottom: 8px;">✨ crack open your daily luck ✨</p>

    <div class="user-info" id="userInfo">
        <span>👤 Loading Telegram data...</span>
        <span>🆔 —</span>
    </div>

    <div class="fortune-box" id="fortuneBox">
        <div class="fortune-text" id="fortuneText">Click the cookie to reveal your fortune</div>
        <div class="fortune-lucky-number" id="luckyNumber"></div>
    </div>

    <button id="crackBtn">🍪 Crack Fortune Cookie</button>
    <button id="shareBtn" class="secondary-btn">📤 Share My Fortune</button>

    <div class="counter">
        <span>🎲 Fortunes opened: <strong id="counterSpan">0</strong></span>
        <span>⭐ Last luck: <strong id="lastLuckSpan">—</strong></span>
    </div>
    <footer>⚡ Works inside Telegram | Haptic feedback enabled</footer>
</div>

<script>
    // Wait for both DOM and Telegram SDK to be ready
    (function() {
        // Retrieve Telegram WebApp object
        const tg = window.Telegram?.WebApp;
        if (!tg) {
            console.warn("Telegram WebApp not loaded, using fallback mode.");
        } else {
            tg.expand();        // use full screen
            tg.ready();         // tell Telegram we're ready
        }

        // DOM elements
        const userInfoDiv = document.getElementById('userInfo');
        const fortuneText = document.getElementById('fortuneText');
        const luckyNumberSpan = document.getElementById('luckyNumber');
        const crackBtn = document.getElementById('crackBtn');
        const shareBtn = document.getElementById('shareBtn');
        const counterSpan = document.getElementById('counterSpan');
        const lastLuckSpan = document.getElementById('lastLuckSpan');

        // App state
        let fortuneCount = 0;
        let lastFortune = "";

        // Load saved count from localStorage (persists between sessions)
        try {
            const saved = localStorage.getItem('fortune_counter');
            if (saved && !isNaN(parseInt(saved))) {
                fortuneCount = parseInt(saved);
                counterSpan.innerText = fortuneCount;
            }
        } catch(e) {}

        // List of 15 unique fortunes
        const fortunes = [
            "🌈 A pleasant surprise is waiting for you.",
            "💎 Someone is thinking of you with gratitude.",
            "🌟 Your kindness will return to you tenfold.",
            "🍀 An unexpected opportunity will arise soon.",
            "🎵 Let your heart guide you, it knows the way.",
            "🌙 Great things never come from comfort zones.",
            "⚡ You are more powerful than you know.",
            "📚 A new friendship will brighten your week.",
            "🌸 Today, choose joy without reason.",
            "💫 The stars align in your favor.",
            "🍃 Let go of what you can't control.",
            "🔥 Your creative spark will ignite something big.",
            "🎯 Focus on what truly matters to you.",
            "💕 Love finds you when you're being yourself.",
            "🏆 A small win will lead to a bigger victory."
        ];

        // Haptic feedback helper
        function vibrateLight() {
            if (tg && tg.HapticFeedback) {
                tg.HapticFeedback.impactOccurred('light');
            }
        }

        function vibrateSuccess() {
            if (tg && tg.HapticFeedback) {
                tg.HapticFeedback.notificationOccurred('success');
            }
        }

        // Generate random fortune
        function getRandomFortune() {
            const randomIndex = Math.floor(Math.random() * fortunes.length);
            return fortunes[randomIndex];
        }

        // Update UI with a new fortune
        function crackFortune() {
            // increment counter
            fortuneCount++;
            counterSpan.innerText = fortuneCount;
            localStorage.setItem('fortune_counter', fortuneCount);
            
            // get new fortune
            const newFortune = getRandomFortune();
            lastFortune = newFortune;
            const luckyNum = Math.floor(Math.random() * 50) + 1; // 1-50
            
            // display
            fortuneText.innerText = newFortune;
            luckyNumberSpan.innerText = `🍀 Lucky number: ${luckyNum}`;
            lastLuckSpan.innerText = luckyNum;
            
            // add a tiny animation to the box
            const box = document.getElementById('fortuneBox');
            box.style.transform = 'scale(0.98)';
            setTimeout(() => { box.style.transform = ''; }, 150);
            
            // haptic success
            vibrateSuccess();
            
            // show Telegram popup (optional but confirms action)
            if (tg && tg.showPopup) {
                tg.showPopup({
                    title: "🎉 Fortune Revealed!",
                    message: `"${newFortune}"\nLucky number: ${luckyNum}`,
                    buttons: [{type: "ok"}]
                });
            }
        }

        // Share the current fortune via Telegram
        function shareFortune() {
            if (!lastFortune) {
                if (tg && tg.showPopup) {
                    tg.showPopup({
                        title: "No fortune yet",
                        message: "Crack a cookie first! 🍪",
                        buttons: [{type: "ok"}]
                    });
                } else {
                    alert("Crack a cookie first!");
                }
                vibrateLight();
                return;
            }
            
            const shareText = `🍪 My fortune cookie says: "${lastFortune}" — what's yours?`;
            if (tg && tg.showPopup) {
                // In Telegram Mini Apps, we can use share to story or copy
                tg.showPopup({
                    title: "📤 Share",
                    message: "Copy this fortune to share with friends?",
                    buttons: [
                        {id: "copy", type: "default", text: "Copy"},
                        {id: "cancel", type: "cancel"}
                    ]
                }, (btnId) => {
                    if (btnId === "copy") {
                        navigator.clipboard.writeText(shareText).then(() => {
                            tg.showToast({text: "Fortune copied! 🎉", duration: 1500});
                        });
                    }
                });
            } else {
                navigator.clipboard.writeText(shareText);
                alert("Fortune copied!");
            }
            vibrateLight();
        }

        // Load and display Telegram user data
        function displayTelegramUser() {
            if (tg && tg.initDataUnsafe) {
                const user = tg.initDataUnsafe.user;
                if (user && user.id) {
                    let name = user.first_name || "User";
                    if (user.last_name) name += " " + user.last_name;
                    userInfoDiv.innerHTML = `<span>👤 ${name}</span><span>🆔 ${user.id}</span>`;
                    return;
                }
            }
            // fallback for browser testing
            userInfoDiv.innerHTML = `<span>👤 Tester Mode</span><span>🆔 demo_123</span>`;
        }

        // event listeners
        crackBtn.addEventListener('click', crackFortune);
        shareBtn.addEventListener('click', shareFortune);
        
        // Initialize app
        displayTelegramUser();
        
        // optional: auto show a welcome fortune if count=0
        if (fortuneCount === 0) {
            setTimeout(() => {
                crackFortune();
            }, 300);
        }

        // make sure Telegram main button is hidden if not used
        if (tg && tg.MainButton) {
            tg.MainButton.hide();
        }
        
        console.log("Fortune Cookie Mini App Loaded — Output visible!");
    })();
</script>
</body>
</html>
