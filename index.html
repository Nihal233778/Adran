       <!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>🍪 Fortune Cookie + Ads | Telegram Mini App</title>
    <!-- Telegram WebApp SDK -->
    <script src="https://telegram.org/js/telegram-web-app.js?56"></script>
    <!-- AdRadar SDK -->
    <script src="https://adradar.xyz/sdk.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
            background: var(--tg-theme-bg-color, #f9f3e8);
            color: var(--tg-theme-text-color, #2c1810);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            transition: background 0.2s;
        }

        .card {
            max-width: 480px;
            width: 100%;
            background: var(--tg-theme-secondary-bg-color, rgba(255,248,235,0.95));
            border-radius: 48px;
            padding: 32px 24px;
            box-shadow: 0 20px 35px -12px rgba(0,0,0,0.2);
            text-align: center;
            backdrop-filter: blur(2px);
            border: 1px solid var(--tg-theme-hint-color, #e6d5b8);
        }

        .emoji-header {
            font-size: 4rem;
            margin-bottom: 12px;
        }

        h1 {
            font-size: 1.8rem;
            font-weight: 700;
            background: linear-gradient(135deg, #ffb347, #ff6b4a);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            margin-bottom: 8px;
        }

        .user-info {
            background: var(--tg-theme-bg-color, #fff0e0);
            border-radius: 60px;
            padding: 12px 18px;
            margin: 20px 0;
            font-size: 0.9rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 8px;
        }

        .fortune-box {
            background: #fffaec;
            border-radius: 32px;
            padding: 28px 16px;
            margin: 20px 0;
            min-height: 150px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            transition: all 0.2s;
            border: 2px dashed #ffb347;
        }

        .fortune-text {
            font-size: 1.35rem;
            font-weight: 500;
            line-height: 1.4;
            color: #5a3e2b;
        }

        .fortune-lucky-number {
            margin-top: 12px;
            font-size: 1rem;
            color: #ff6b4a;
            font-weight: 600;
        }

        button {
            background: var(--tg-theme-button-color, #ffb347);
            color: var(--tg-theme-button-text-color, #2c1810);
            border: none;
            font-size: 1.2rem;
            font-weight: 600;
            padding: 14px 28px;
            border-radius: 60px;
            cursor: pointer;
            width: 100%;
            transition: transform 0.1s, opacity 0.2s;
            margin-top: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        button:active {
            transform: scale(0.97);
        }

        .secondary-btn {
            background: transparent;
            border: 2px solid var(--tg-theme-button-color, #ffb347);
            color: var(--tg-theme-button-color, #ffb347);
            margin-top: 8px;
        }

        .ad-btn {
            background: linear-gradient(135deg, #6a11cb, #2575fc);
            color: white;
            border: none;
        }

        .counter {
            margin-top: 20px;
            font-size: 0.8rem;
            opacity: 0.7;
            display: flex;
            justify-content: center;
            gap: 20px;
            flex-wrap: wrap;
        }

        footer {
            margin-top: 24px;
            font-size: 0.7rem;
            opacity: 0.5;
        }

        .ad-warning {
            font-size: 0.7rem;
            color: #ff6b4a;
            margin-top: 8px;
        }
    </style>
</head>
<body>
<div class="card">
    <div class="emoji-header">🥠</div>
    <h1>Fortune Cookie</h1>
    <p style="opacity: 0.7; margin-bottom: 8px;">✨ crack open your daily luck ✨</p>

    <div class="user-info" id="userInfo">
        <span>👤 Loading Telegram data...</span>
        <span>🆔 —</span>
    </div>

    <div class="fortune-box" id="fortuneBox">
        <div class="fortune-text" id="fortuneText">Click the cookie to reveal your fortune</div>
        <div class="fortune-lucky-number" id="luckyNumber"></div>
    </div>

    <button id="crackBtn">🍪 Crack Fortune Cookie</button>
    <button id="adRewardBtn" class="ad-btn">🎥 Watch Ad & Get +1 Fortune</button>
    <button id="shareBtn" class="secondary-btn">📤 Share My Fortune</button>

    <div class="counter">
        <span>🎲 Fortunes opened: <strong id="counterSpan">0</strong></span>
        <span>⭐ Ad bonus fortunes: <strong id="adBonusSpan">0</strong></span>
        <span>🍀 Last luck: <strong id="lastLuckSpan">—</strong></span>
    </div>
    <div class="ad-warning" id="adStatus">💰 Watch an ad to earn extra fortune (reward grants +1)</div>
    <footer>⚡ Telegram Mini App | Ads powered by AdRadar</footer>
</div>

<script>
    // Wait for DOM and Telegram SDK
    (function() {
        // Telegram WebApp
        const tg = window.Telegram?.WebApp;
        if (!tg) {
            console.warn("Telegram WebApp not loaded, using fallback mode.");
        } else {
            tg.expand();        // full screen
            tg.ready();         // tell Telegram we're ready
        }

        // DOM elements
        const userInfoDiv = document.getElementById('userInfo');
        const fortuneText = document.getElementById('fortuneText');
        const luckyNumberSpan = document.getElementById('luckyNumber');
        const crackBtn = document.getElementById('crackBtn');
        const shareBtn = document.getElementById('shareBtn');
        const adRewardBtn = document.getElementById('adRewardBtn');
        const counterSpan = document.getElementById('counterSpan');
        const adBonusSpan = document.getElementById('adBonusSpan');
        const lastLuckSpan = document.getElementById('lastLuckSpan');
        const adStatusSpan = document.getElementById('adStatus');

        // App state
        let fortuneCount = 0;       // regular fortune cookie cracks
        let adBonusCount = 0;       // extra fortunes earned via ads
        let lastFortune = "";
        let lastLuckyNum = 0;

        // Load saved data from localStorage
        try {
            const savedCount = localStorage.getItem('fortune_counter');
            if (savedCount && !isNaN(parseInt(savedCount))) {
                fortuneCount = parseInt(savedCount);
                counterSpan.innerText = fortuneCount;
            }
            const savedAdBonus = localStorage.getItem('ad_bonus_count');
            if (savedAdBonus && !isNaN(parseInt(savedAdBonus))) {
                adBonusCount = parseInt(savedAdBonus);
                adBonusSpan.innerText = adBonusCount;
            }
        } catch(e) {}

        // Fortunes list
        const fortunes = [
            "🌈 A pleasant surprise is waiting for you.",
            "💎 Someone is thinking of you with gratitude.",
            "🌟 Your kindness will return to you tenfold.",
            "🍀 An unexpected opportunity will arise soon.",
            "🎵 Let your heart guide you, it knows the way.",
            "🌙 Great things never come from comfort zones.",
            "⚡ You are more powerful than you know.",
            "📚 A new friendship will brighten your week.",
            "🌸 Today, choose joy without reason.",
            "💫 The stars align in your favor.",
            "🍃 Let go of what you can't control.",
            "🔥 Your creative spark will ignite something big.",
            "🎯 Focus on what truly matters to you.",
            "💕 Love finds you when you're being yourself.",
            "🏆 A small win will lead to a bigger victory."
        ];

        // Haptic feedback
        function vibrateLight() {
            if (tg && tg.HapticFeedback) tg.HapticFeedback.impactOccurred('light');
        }
        function vibrateSuccess() {
            if (tg && tg.HapticFeedback) tg.HapticFeedback.notificationOccurred('success');
        }
        function vibrateError() {
            if (tg && tg.HapticFeedback) tg.HapticFeedback.notificationOccurred('error');
        }

        // Show a Telegram popup (or fallback alert)
        function showMessage(title, message, isError = false) {
            if (tg && tg.showPopup) {
                tg.showPopup({ title, message, buttons: [{type: "ok"}] });
            } else {
                alert(`${title}: ${message}`);
            }
            if (isError) vibrateError();
            else vibrateSuccess();
        }

        // Get random fortune
        function getRandomFortune() {
            return fortunes[Math.floor(Math.random() * fortunes.length)];
        }

        // Update fortune display (core)
        function displayFortune(fortuneTextStr, luckyNum) {
            fortuneText.innerText = fortuneTextStr;
            luckyNumberSpan.innerText = `🍀 Lucky number: ${luckyNum}`;
            lastFortune = fortuneTextStr;
            lastLuckyNum = luckyNum;
            lastLuckSpan.innerText = luckyNum;
            // animate box
            const box = document.getElementById('fortuneBox');
            box.style.transform = 'scale(0.98)';
            setTimeout(() => { box.style.transform = ''; }, 150);
        }

        // Crack a new fortune (regular)
        function crackFortune() {
            fortuneCount++;
            counterSpan.innerText = fortuneCount;
            localStorage.setItem('fortune_counter', fortuneCount);
            
            const newFortune = getRandomFortune();
            const luckyNum = Math.floor(Math.random() * 50) + 1;
            displayFortune(newFortune, luckyNum);
            
            vibrateSuccess();
            
            if (tg && tg.showPopup) {
                tg.showPopup({
                    title: "🎉 Fortune Revealed!",
                    message: `"${newFortune}"\nLucky number: ${luckyNum}`,
                    buttons: [{type: "ok"}]
                });
            }
        }

        // Add ad bonus fortune (does not increment regular count, only bonus)
        function addAdBonusFortune() {
            adBonusCount++;
            adBonusSpan.innerText = adBonusCount;
            localStorage.setItem('ad_bonus_count', adBonusCount);
            
            const newFortune = getRandomFortune();
            const luckyNum = Math.floor(Math.random() * 50) + 1;
            displayFortune(newFortune, luckyNum);
            
            showMessage("🎁 Ad Reward Claimed!", `You earned an extra fortune!\n"${newFortune}"\nLucky number: ${luckyNum}`);
        }

        // Watch ad with reward
        function watchAdAndReward() {
            // Check if AdRadar is available
            if (typeof AdRadar === 'undefined' || !AdRadar.showAd) {
                showMessage("Ad SDK Error", "AdRadar not loaded yet. Please try again later.", true);
                console.error("AdRadar SDK missing");
                return;
            }
            
            vibrateLight();
            adStatusSpan.innerText = "📺 Loading ad... please wait";
            
            try {
                AdRadar.showAd({
                    adUnitId: "69f24eed329966f763d01d66",
                    onReward: function() {
                        // User successfully watched the ad and earned reward
                        addAdBonusFortune();
                        adStatusSpan.innerText = "✅ Ad rewarded! +1 fortune earned!";
                        vibrateSuccess();
                        setTimeout(() => {
                            adStatusSpan.innerText = "💰 Watch an ad to earn extra fortune (reward grants +1)";
                        }, 3000);
                    },
                    onError: function(error) {
                        console.error("Ad error:", error);
                        adStatusSpan.innerText = "❌ Ad failed to load. Try again later.";
                        showMessage("Ad Error", "Could not load ad. Please check your connection.", true);
                        setTimeout(() => {
                            adStatusSpan.innerText = "💰 Watch an ad to earn extra fortune (reward grants +1)";
                        }, 3000);
                    },
                    onClose: function() {
                        // Ad was closed without completing (optional)
                        if (adStatusSpan.innerText !== "✅ Ad rewarded! +1 fortune earned!") {
                            adStatusSpan.innerText = "⏸️ Ad closed early. No reward given.";
                            setTimeout(() => {
                                adStatusSpan.innerText = "💰 Watch an ad to earn extra fortune (reward grants +1)";
                            }, 2000);
                        }
                    }
                });
            } catch(e) {
                console.error("AdRadar exception:", e);
                adStatusSpan.innerText = "⚠️ Ad error. Please try again.";
                showMessage("Ad Error", "Something went wrong. Please try again later.", true);
            }
        }

        // Share current fortune
        function shareFortune() {
            if (!lastFortune) {
                showMessage("No fortune yet", "Crack a cookie first! 🍪");
                vibrateLight();
                return;
            }
            const shareText = `🍪 My fortune cookie says: "${lastFortune}" (lucky ${lastLuckyNum}) — what's yours?`;
            if (tg && tg.showPopup) {
                tg.showPopup({
                    title: "📤 Share",
                    message: "Copy this fortune to share with friends?",
                    buttons: [
                        {id: "copy", type: "default", text: "Copy"},
                        {id: "cancel", type: "cancel"}
                    ]
                }, (btnId) => {
                    if (btnId === "copy") {
                        navigator.clipboard.writeText(shareText).then(() => {
                            if (tg.showToast) tg.showToast({text: "Fortune copied! 🎉", duration: 1500});
                            else alert("Fortune copied!");
                        });
                    }
                });
            } else {
                navigator.clipboard.writeText(shareText);
                alert("Fortune copied!");
            }
            vibrateLight();
        }

        // Load Telegram user info
        function displayTelegramUser() {
            if (tg && tg.initDataUnsafe) {
                const user = tg.initDataUnsafe.user;
                if (user && user.id) {
                    let name = user.first_name || "User";
                    if (user.last_name) name += " " + user.last_name;
                    userInfoDiv.innerHTML = `<span>👤 ${name}</span><span>🆔 ${user.id}</span>`;
                    return;
                }
            }
            userInfoDiv.innerHTML = `<span>👤 Tester Mode</span><span>🆔 demo_123</span>`;
        }

        // Bind events
        crackBtn.addEventListener('click', crackFortune);
        shareBtn.addEventListener('click', shareFortune);
        adRewardBtn.addEventListener('click', watchAdAndReward);

        // Initialize
        displayTelegramUser();
        
        // Optional: welcome fortune if none
        if (fortuneCount === 0 && adBonusCount === 0) {
            setTimeout(() => {
                crackFortune();
            }, 300);
        }

        // Hide Telegram MainButton if present
        if (tg && tg.MainButton) tg.MainButton.hide();
        
        console.log("Fortune Cookie with AdRadar integration loaded. Ad unit ID: 69f24eed329966f763d01d66");
    })();
</script>
</body>
</html>
